<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">FableLayer — procedure, verification, benchmark</title>
  <desc id="desc">A dark blueprint-style hero image showing four public-safe layers flowing into verification gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090b10"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)" rx="28"/>
  <g opacity="0.14" stroke="#e5e7eb" stroke-width="1">
    <path d="M80 70H1120M80 140H1120M80 210H1120M80 280H1120M80 350H1120"/>
    <path d="M120 50V370M260 50V370M400 50V370M540 50V370M680 50V370M820 50V370M960 50V370M1100 50V370"/>
  </g>
  <text x="80" y="104" fill="#f9fafb" font-family="Inter, ui-sans-serif, system-ui" font-size="48" font-weight="800">FableLayer</text>
  <text x="82" y="145" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="21">Open-source the discipline, not a model capability claim.</text>
  <g transform="translate(80 196)">
    <rect width="210" height="78" rx="18" fill="#111827" stroke="#8b5cf6" stroke-width="2"/>
    <text x="24" y="34" fill="#ede9fe" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="700">PromptCore</text>
    <text x="24" y="58" fill="#a7f3d0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">public-safe profile</text>
  </g>
  <g transform="translate(330 196)">
    <rect width="210" height="78" rx="18" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
    <text x="24" y="34" fill="#e0f2fe" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="700">Procedure</text>
    <text x="24" y="58" fill="#a7f3d0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">investigate → verify</text>
  </g>
  <g transform="translate(580 196)">
    <rect width="210" height="78" rx="18" fill="#111827" stroke="#34d399" stroke-width="2"/>
    <text x="24" y="34" fill="#d1fae5" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="700">Router</text>
    <text x="24" y="58" fill="#a7f3d0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">cost-aware escalation</text>
  </g>
  <g transform="translate(830 196)">
    <rect width="250" height="78" rx="18" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
    <text x="24" y="34" fill="#fef3c7" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="700">Benchmark Gates</text>
    <text x="24" y="58" fill="#a7f3d0" font-family="Inter, ui-sans-serif, system-ui" font-size="13">evidence or fail closed</text>
  </g>
  <path d="M291 235H326M541 235H576M791 235H826" stroke="url(#line)" stroke-width="5" stroke-linecap="round" filter="url(#soft)"/>
  <g transform="translate(82 324)">
    <rect width="1010" height="44" rx="14" fill="rgba(15,23,42,0.72)" stroke="#334155"/>
    <text x="20" y="28" fill="#e5e7eb" font-family="Inter, ui-sans-serif, system-ui" font-size="15">152 stdlib tests · license/performance/runtime gates · no private prompt text · local-first publishing guard</text>
  </g>
</svg>
